name: Backend CI

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

jobs:
  lint-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: uninet
          POSTGRES_PASSWORD: uninet_test
          POSTGRES_DB: uninet_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U uninet -d uninet_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      ENVIRONMENT: test
      SECRET_KEY: ci-secret-1234567890abcdef
      DATABASE_URL: postgresql+psycopg://uninet:uninet_test@localhost:5432/uninet_test
      REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Instalar dependencias
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check app tests

      - name: Verificar formato (ruff format)
        run: ruff format --check app tests

      - name: Aplicar migraciones
        run: alembic upgrade head

      - name: Ejecutar pytest
        run: pytest
